<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <link rel="stylesheet" href="popup.css">
  <title>Volume Control</title>
</head>
<body>
  <div class="container" id="main-view">


    <div class="volume-display" id="volume-display">100%</div>

    <div class="slider-track-wrapper">
      <div class="slider-markers">
        <span class="marker marker-0">0</span>
        <span class="marker marker-100">100</span>
        <span class="marker marker-600">600</span>
      </div>
      <input
        type="range"
        id="volume-slider"
        min="0"
        max="600"
        value="100"
        step="1"
      >
    </div>

    <div class="controls">
      <button id="reset-btn" class="btn btn-reset" title="Reset to 100%">Reset</button>
    </div>
  </div>

  <div class="container error-view" id="error-view" style="display:none;">

    <p class="error-msg" id="error-msg">このタブでは音量制御を開始できません</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
